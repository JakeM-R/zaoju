  <style>
    [data-theme="ink"] {
      --bg:              #0D0D0F;
      --surface:         #141418;
      --surface-raised:  #1C1C22;
      --border:          #2A2A33;

      --text-secondary:  #72727A;
      --text-tertiary:   #44444C;

      --accent-dim:      #1A3328;

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
    }

      max-width: 480px;

      display: flex;
      flex-direction: column;

      font-family: var(--font-body);
      -webkit-tap-highlight-color: transparent;
    }

      background: var(--accent2);
      color: #0D0D0F;
      border-radius: 8px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      width: 100%;
    }

    .btn-outline {
      border: 1.5px solid var(--border);
      color: var(--text-secondary);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 500;
    }

    .input-field {
      background: var(--surface-raised);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 16px;
      padding: 12px 16px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .input-field:focus { border-color: var(--accent); }
    .input-field::placeholder { color: var(--text-tertiary); }

    .chip {
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      background: transparent;
      transition: all 0.15s;
    }
    .chip.active {
      border-color: var(--accent);
      color: var(--accent-text);
      background: var(--accent-dim);
    }

    .segmented {
      display: flex;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      gap: 3px;
    }
    .seg-btn {
      flex: 1;
      border-radius: 5px;
      padding: 8px 0;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.15s;
    }
    .seg-btn.active {
      background: var(--accent2-dim);
      color: var(--accent2-text);
      border: 1.5px solid var(--accent2);
    }

    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    .blank {
      display: inline-block;
      min-width: 4em;
      border-bottom: 1.5px solid rgba(76, 175, 138, 0.5);
      vertical-align: bottom;
      margin-bottom: 2px;
    }

    .result-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font-body);
    }
    .result-chip.ok {
      background: var(--success);
      border: 1.5px solid var(--success-border);
      color: var(--success-text);
    }
    .result-chip.bad {
      background: var(--danger);
      border: 1.5px solid var(--danger-border);
      color: var(--danger-text);
    }

      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;

      color: var(--success-text);
      background: transparent;

    .grade-btn.g-wrong {
      border: 1.5px solid var(--danger-border);
      color: var(--danger-text);
      background: transparent;
    }
    .grade-btn.g-wrong.sel { background: var(--danger); }

      font-weight: 500;
      color: var(--text-tertiary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;

      from { opacity: 0; }
      to   { opacity: 1; }
    }

// ─── STORAGE ──────────────────────────────────────────────────────────────────
const PROGRESS_KEY = 'msc_progress_v1';
const FILTER_KEY   = 'msc_filter_v1';
const SESSION_KEY  = 'msc_session_v1';

function loadProgress()      { try { return JSON.parse(localStorage.getItem(PROGRESS_KEY)) || {}; } catch { return {}; } }
function saveProgress(p)     { try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(p)); } catch {} }
function loadFilter()        { try { return JSON.parse(localStorage.getItem(FILTER_KEY)) || [1, 2, 3]; } catch { return [1, 2, 3]; } }
function saveFilter(f)       { try { localStorage.setItem(FILTER_KEY, JSON.stringify(f)); } catch {} }
function loadSessionLength() { try { const v = localStorage.getItem(SESSION_KEY); return v === 'all' ? 'all' : (parseInt(v) || 20); } catch { return 20; } }
function saveSessionLength(l){ try { localStorage.setItem(SESSION_KEY, String(l)); } catch {} }

// ─── MATCHING ─────────────────────────────────────────────────────────────────
function normalise(str) {
  return str
    .toLowerCase()
    .normalize('NFD')
    .replace(/[̀-ͯ]/g, '')
    .replace(/v/g, 'u')
    .replace(/[^a-z]/g, '');
}

function checkAnswer(input, entry) {
  return normalise(input) === entry.targetPinyin || input.trim() === entry.target;
}

// ─── SESSION ──────────────────────────────────────────────────────────────────
function getWeight(rec) {
  if (!rec) return 3;
  const { correct, missed, streak } = rec;
  if (streak === 0 && missed > 0) return 4;
  if (streak >= 3) return 1;
  if (correct < 2 || streak === 1) return 3;
  if (streak === 2) return 2;
  return 2;
}

function buildSession(activeHsk, sessionLength, progress) {
  const filtered = CORPUS.filter(e => activeHsk.includes(e.hsk));
  const pool = [];
  for (const entry of filtered) {
    const w = getWeight(progress[entry.id]);
    for (let i = 0; i < w; i++) pool.push(entry.id);
  }
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  const seen = new Set();
  const queue = [];
  for (const id of pool) { if (!seen.has(id)) { seen.add(id); queue.push(id); } }
  const limit = sessionLength === 'all' ? queue.length : Math.min(sessionLength, queue.length);
  return queue.slice(0, limit);
}

// ─── SENTENCE LINE ────────────────────────────────────────────────────────────
function SentenceLine({ text, targetFull, revealed, style, targetStyle }) {
  const parts = text.split('___');
  return (
    <span style={style}>
      {parts[0]}
      {revealed
        ? <span style={targetStyle}>{targetFull}</span>
        : <span className="blank" />
      }
      {parts[1] || ''}
    </span>
  );
}

// ─── HOME SCREEN ──────────────────────────────────────────────────────────────

  const records = Object.values(progress);
  const totalAnswered = records.reduce((s, r) => s + r.correct + r.missed, 0);
  const totalCorrect  = records.reduce((s, r) => s + r.correct, 0);
  const totalAttempted = records.filter(r => r.correct + r.missed > 0).length;
  const pct = totalAnswered > 0 ? Math.round(totalCorrect / totalAnswered * 100) : 0;

  function toggleHsk(level) {
    setFilter(f => {
      if (f.includes(level)) return f.length === 1 ? f : f.filter(x => x !== level);
      return [...f, level].sort();
    });

        </p>
      </div>

        <div style={{ display: 'flex', gap: 8 }}>

              HSK {level}
            </button>
          ))}
        </div>
      </div>

      <div style={{ marginBottom: 28 }}>

        <div className="segmented">
          {[20, 40, 'all'].map(opt => (

          ))}
        </div>
      </div>

      <p style={{ color: 'var(--text-secondary)', fontSize: 14, marginBottom: 32 }}>
        {available} sentence{available !== 1 ? 's' : ''} available
      </p>

      <button className="btn-cta" onClick={onStart} disabled={available === 0}>
        开始 Start
      </button>

      {totalAnswered > 0 && (
        <p style={{ color: 'var(--text-tertiary)', fontSize: 12, textAlign: 'center', marginTop: 'auto', paddingTop: 32 }}>
          {totalAttempted} attempted · {pct}% correct all time
        </p>
      )}
    </div>
  );
}

// ─── STUDY SCREEN ─────────────────────────────────────────────────────────────
function StudyScreen({ queue, idx, onGrade }) {
  const [input, setInput] = useState('');
  const [checkedInput, setCheckedInput] = useState('');
  const [revealed, setRevealed] = useState(false);
  const [matchResult, setMatchResult] = useState(false);
  const inputRef = useRef(null);

  const entry = CORPUS.find(e => e.id === queue[idx]);

  useEffect(() => {
    setInput('');
    setCheckedInput('');
    setRevealed(false);
    setMatchResult(false);
    const t = setTimeout(() => inputRef.current?.focus(), 60);
    return () => clearTimeout(t);
  }, [idx, queue]);

  useEffect(() => {
    function onKey(e) {
      if (e.key === 'Enter' && revealed) {
        e.preventDefault();
        onGrade(entry.id, matchResult);
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [revealed, matchResult, entry, onGrade]);

  function handleCheck() {
    if (!input.trim()) return;
    const correct = checkAnswer(input, entry);
    setCheckedInput(input);
    setMatchResult(correct);
    setRevealed(true);
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', flex: 1, padding: '20px 0 48px' }}>
      <div style={{ textAlign: 'right', color: 'var(--text-tertiary)', fontSize: 13, fontWeight: 500, marginBottom: 20 }}>
        {idx + 1} / {queue.length}
      </div>

      <div className="card">
        {/* Pinyin line — primary */}
        <div style={{ marginBottom: 10, lineHeight: 1.9 }}>
          <SentenceLine
            text={entry.pinyin}
            targetFull={entry.targetPinyinFull}
            revealed={revealed}
            style={{ fontFamily: 'var(--font-body)', fontSize: 18, color: 'var(--text-primary)' }}
            targetStyle={{ color: 'var(--accent)', fontWeight: 600 }}
          />
        </div>

        {/* Hanzi line — secondary pre-reveal, primary post-reveal */}
        <div style={{ marginBottom: 24, lineHeight: 1.6 }}>
          <SentenceLine
            text={entry.blanked}
            targetFull={entry.target}
            revealed={revealed}
            style={{
              fontFamily: 'var(--font-chinese)',
              fontSize: 26,
              color: revealed ? 'var(--text-primary)' : 'var(--text-secondary)',
              transition: 'color 0.15s',
            }}
            targetStyle={{ color: 'var(--accent)', fontWeight: 700 }}
          />
        </div>

        {!revealed ? (
          <div style={{ display: 'flex', gap: 8 }}>
            <input
              ref={inputRef}
              className="input-field"
              type="text"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && input.trim() && handleCheck()}
              placeholder="pinyin · e.g. gaoxing"
              autoCapitalize="none"
              autoCorrect="off"
              autoComplete="off"
              spellCheck={false}
              inputMode="text"
            />
            <button
              className="btn-outline"
              onClick={handleCheck}
              disabled={!input.trim()}
              style={{ whiteSpace: 'nowrap', flexShrink: 0 }}
            >
              Check
            </button>
          </div>
        ) : (
          <div className="fade-in">
            {/* English */}
            <p style={{ color: 'var(--text-secondary)', fontSize: 14, lineHeight: 1.5, marginBottom: entry.note ? 6 : 16 }}>
              {entry.english}
            </p>

            {/* Usage note */}
            {entry.note && (
              <p style={{ color: 'var(--accent2-text)', fontSize: 13, fontStyle: 'italic', lineHeight: 1.5, marginBottom: 16 }}>
                {entry.note}
              </p>
            )}

            <div className="divider" />

            {/* Result chip */}
            <div style={{ marginBottom: 14 }}>
              {matchResult ? (
                <span className="result-chip ok">✓ {normalise(checkedInput)}</span>
              ) : (
                <span className="result-chip bad">✗ {checkedInput} → {entry.targetPinyin}</span>
              )}
            </div>

            {/* Grade buttons */}
            <div className="grade-row">
              <button
                className={`grade-btn g-correct ${matchResult ? 'sel' : ''}`}
                onClick={() => onGrade(entry.id, true)}
              >
                ✓ 对了
              </button>
              <button
                className={`grade-btn g-wrong ${!matchResult ? 'sel' : ''}`}
                onClick={() => onGrade(entry.id, false)}
              >
                ✗ 错了
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── SUMMARY SCREEN ───────────────────────────────────────────────────────────
function SummaryScreen({ sessionResults, onAgain, onHome }) {
  const correct = sessionResults.filter(r => r.correct).length;
  const total   = sessionResults.length;
  const pct     = total > 0 ? Math.round(correct / total * 100) : 0;

  const breakdown = [1, 2, 3].map(level => {
    const rows = sessionResults.filter(r => CORPUS.find(c => c.id === r.id)?.hsk === level);
    if (!rows.length) return null;
    return { level, correct: rows.filter(r => r.correct).length, total: rows.length };
  }).filter(Boolean);

  const scoreColor = pct >= 80 ? 'var(--accent)' : pct >= 55 ? 'var(--accent2)' : 'var(--text-primary)';

  return (
    <div style={{ display: 'flex', flexDirection: 'column', flex: 1, justifyContent: 'center', padding: '40px 0' }}>
      <div style={{ textAlign: 'center', marginBottom: 40 }}>
        <div style={{ fontFamily: 'var(--font-heading)', fontSize: 64, fontWeight: 700, lineHeight: 1, color: scoreColor, marginBottom: 8 }}>
          {correct}/{total}
        </div>
        <div style={{ color: 'var(--text-secondary)', fontSize: 20 }}>{pct}%</div>
      </div>

      {breakdown.length > 1 && (
        <div className="card" style={{ marginBottom: 32 }}>
          {breakdown.map((b, i) => (
            <div key={b.level} style={{
              display: 'flex',
              justifyContent: 'space-between',
              alignItems: 'center',
              paddingTop: i > 0 ? 12 : 0,
              marginTop: i > 0 ? 12 : 0,
              borderTop: i > 0 ? '1px solid var(--border)' : 'none',
            }}>
              <span style={{ color: 'var(--text-secondary)', fontSize: 14 }}>HSK {b.level}</span>
              <span style={{ color: 'var(--text-primary)', fontSize: 14, fontWeight: 500 }}>
                {b.correct}/{b.total}
              </span>
            </div>
          ))}
        </div>
      )}

      <div style={{ display: 'flex', gap: 10 }}>
        <button className="btn-outline" onClick={onHome} style={{ flex: 1, padding: '14px', fontSize: 15 }}>
          回家 Home
        </button>
        <button className="btn-cta" onClick={onAgain} style={{ flex: 1 }}>
          再来一次 Again
        </button>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen]               = useState('home');
  const [filter, setFilterState]          = useState(() => loadFilter());
  const [sessionLength, setSessionLenState] = useState(() => loadSessionLength());
  const [progress, setProgress]           = useState(() => loadProgress());
  const [queue, setQueue]                 = useState([]);
  const [idx, setIdx]                     = useState(0);
  const [sessionResults, setSessionResults] = useState([]);

  function setFilter(f) {
    const next = typeof f === 'function' ? f(filter) : f;
    setFilterState(next);
    saveFilter(next);
  }

  function setSessionLength(l) {
    setSessionLenState(l);
    saveSessionLength(l);
  }

  function startSession() {
    const q = buildSession(filter, sessionLength, progress);
    setQueue(q);
    setIdx(0);
    setSessionResults([]);
    setScreen('study');
  }

  const handleGrade = useCallback((id, correct) => {
    setProgress(prev => {
      const rec = prev[id] || { correct: 0, missed: 0, lastSeen: 0, streak: 0 };
      const next = {
        ...prev,
        [id]: {
          correct: rec.correct + (correct ? 1 : 0),
          missed:  rec.missed  + (correct ? 0 : 1),
          lastSeen: Date.now(),
          streak: correct ? rec.streak + 1 : 0,
        },
      };
      saveProgress(next);
      return next;
    });
    setSessionResults(prev => {
      const next = [...prev, { id, correct }];
      if (idx + 1 >= queue.length) {
        setTimeout(() => setScreen('summary'), 0);
      } else {
        setIdx(i => i + 1);
      }
      return next;
    });
  }, [idx, queue.length]);

  return (
    <>
      {screen === 'home' && (
        <HomeScreen
          onStart={startSession}
          filter={filter}
          setFilter={setFilter}
          sessionLength={sessionLength}
          setSessionLength={setSessionLength}
          progress={progress}
        />
      )}
      {screen === 'study' && queue.length > 0 && (
        <StudyScreen
          queue={queue}
          idx={idx}
          onGrade={handleGrade}
        />
      )}
      {screen === 'summary' && (
        <SummaryScreen
          sessionResults={sessionResults}
          onAgain={startSession}
          onHome={() => setScreen('home')}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
