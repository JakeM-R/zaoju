  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    [data-theme="ink"] {
      --bg:              #efe7d6;
      --surface:         #f7f1e3;
      --surface-raised:  #ece3cf;
      --border:          #ddd2ba;
      --text-primary:    #241f17;
      --text-secondary:  #8a8170;
      --text-tertiary:   #a89e88;
      --accent:          #4caf8a;
      --accent-dim:      rgba(76,175,138,0.18);
      --accent-text:     #2c7a58;
      --accent2:         #a51e17;
      --accent2-dim:     rgba(165,30,23,0.12);
      --accent2-text:    #8f1812;
      --accent2-on:      #fbeee9;
      --success:         rgba(76,175,138,0.15);
      --success-border:  #4caf8a;
      --success-text:    #2c7a58;
      --danger:          rgba(165,30,23,0.1);
      --danger-border:   #a51e17;
      --danger-text:     #8f1812;
      --font-heading:    'Libre Baskerville', Georgia, serif;
      --font-body:       'Noto Serif', Georgia, serif;
      --font-chinese:    'Noto Serif SC', 'Noto Serif', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      justify-content: center;
    }

    #root {
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      overflow: hidden;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
      font-family: var(--font-body);
      -webkit-tap-highlight-color: transparent;
    }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-cta {
      background: var(--accent2);
      color: var(--accent2-on);
      border-radius: 8px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      width: 100%;
    }
    .btn-cta:not(:disabled):active { opacity: 0.85; }

    .btn-outline {
      border: 1.5px solid var(--border);
      color: var(--text-secondary);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 500;
    }

    .input-field {
      background: var(--surface-raised);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 16px;
      padding: 12px 16px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .input-field:focus { border-color: var(--accent); }
    .input-field::placeholder { color: var(--text-tertiary); }

    .chip {
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      background: transparent;
      transition: all 0.15s;
    }
    .chip.active {
      border-color: var(--accent);
      color: var(--accent-text);
      background: var(--accent-dim);
    }

    .segmented {
      display: flex;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      gap: 3px;
    }
    .seg-btn {
      flex: 1;
      border-radius: 5px;
      padding: 8px 0;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.15s;
    }
    .seg-btn.active {
      background: var(--accent2-dim);
      color: var(--accent2-text);
      border: 1.5px solid var(--accent2);
    }

    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    .blank {
      display: inline-block;
      min-width: 4em;
      border-bottom: 1.5px solid rgba(76, 175, 138, 0.5);
      vertical-align: bottom;
      margin-bottom: 2px;
    }

    .result-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font-body);
    }
    .result-chip.ok {
      background: var(--success);
      border: 1.5px solid var(--success-border);
      color: var(--success-text);
    }
    .result-chip.bad {
      background: var(--danger);
      border: 1.5px solid var(--danger-border);
      color: var(--danger-text);
    }

    .grade-row { display: flex; gap: 8px; }
    .grade-btn {
      flex: 1;
      padding: 13px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
    }
    .grade-btn.g-correct {
      border: 1.5px solid var(--success-border);
      color: var(--success-text);
      background: transparent;
    }
    .grade-btn.g-correct.sel { background: var(--success); }
    .grade-btn.g-wrong {
      border: 1.5px solid var(--danger-border);
      color: var(--danger-text);
      background: transparent;
    }
    .grade-btn.g-wrong.sel { background: var(--danger); }

    .divider { height: 1px; background: var(--border); margin: 16px 0; }

    .sec-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-tertiary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .fade-in { animation: fadeIn 0.15s ease-out; }

    .word-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 16px 0 4px; }
    .word-chip {
      font-family: var(--font-chinese);
      font-size: 16px;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      background: transparent;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.1s;
    }
    .word-chip.active { border-color: var(--accent2); color: var(--text-primary); background: var(--surface-raised); }
    .word-chip.is-target { color: var(--text-tertiary); border-style: dashed; }
    .word-chip.is-target.revealed { color: var(--accent-text); border-color: var(--accent); border-style: solid; }
    .word-def {
      background: var(--surface-raised);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 12px;
    }
  </style>
</head>

    words:[{h:"我",p:"wǒ",e:"I; me"},{h:"还",p:"hái",e:"still; yet"},{h:"没",p:"méi",e:"not (have); haven't"},{h:"明白",p:"míngbai",e:"to understand"},{h:"他",p:"tā",e:"he; him"},{h:"说",p:"shuō",e:"said"},{h:"的",p:"de",e:"(structural particle)"},{h:"意思",p:"yìsi",e:"meaning; idea"}],
  },
];

// ─── STORAGE ──────────────────────────────────────────────────────────────────
const PROGRESS_KEY = 'msc_progress_v1';
const FILTER_KEY   = 'msc_filter_v1';
const SESSION_KEY  = 'msc_session_v1';

function loadProgress()       { try { return JSON.parse(localStorage.getItem(PROGRESS_KEY)) || {}; } catch { return {}; } }
function saveProgress(p)      { try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(p)); } catch {} }
function loadFilter()         { try { return JSON.parse(localStorage.getItem(FILTER_KEY)) || [1,2,3]; } catch { return [1,2,3]; } }
function saveFilter(f)        { try { localStorage.setItem(FILTER_KEY, JSON.stringify(f)); } catch {} }
function loadSessionLength()  { try { const v = localStorage.getItem(SESSION_KEY); return v === 'all' ? 'all' : (parseInt(v) || 20); } catch { return 20; } }
function saveSessionLength(l) { try { localStorage.setItem(SESSION_KEY, String(l)); } catch {} }

// ─── MATCHING ─────────────────────────────────────────────────────────────────
function normalise(str) {
  return str.toLowerCase().normalize('NFD')
    .replace(/[̀-ͯ]/g, '').replace(/v/g,'u').replace(/[^a-z]/g,'');
}
function checkAnswer(input, entry) {
  return normalise(input) === entry.targetPinyin || input.trim() === entry.target;
}

// ─── SESSION ──────────────────────────────────────────────────────────────────
function getWeight(rec) {
  if (!rec) return 3;
  const { correct, missed, streak } = rec;
  if (streak === 0 && missed > 0) return 4;
  if (streak >= 3) return 1;
  if (correct < 2 || streak === 1) return 3;
  if (streak === 2) return 2;
  return 2;
}

function buildSession(activeHsk, sessionLength, progress) {
  const filtered = CORPUS.filter(e => activeHsk.includes(e.hsk));
  const pool = [];
  for (const entry of filtered) {
    const w = getWeight(progress[entry.id]);
    for (let i = 0; i < w; i++) pool.push(entry.id);
  }
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  const seen = new Set(), queue = [];
  for (const id of pool) { if (!seen.has(id)) { seen.add(id); queue.push(id); } }
  const limit = sessionLength === 'all' ? queue.length : Math.min(sessionLength, queue.length);
  return queue.slice(0, limit);
}

// ─── STATE ────────────────────────────────────────────────────────────────────
const state = {
  screen: 'home',
  filter: loadFilter(),
  sessionLength: loadSessionLength(),
  progress: loadProgress(),
  queue: [],
  idx: 0,
  input: '',
  revealed: false,
  matchResult: false,
  checkedInput: '',
  sessionResults: [],
  wordPopup: null,
};

function currentEntry() {
  return CORPUS.find(e => e.id === state.queue[state.idx]);
}

// ─── HTML HELPERS ─────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sentenceLine(text, targetFull, revealed, wrapStyle, targetStyle) {
  const [before, after = ''] = text.split('___');
  const mid = revealed
    ? `<span style="${targetStyle}">${esc(targetFull)}</span>`
    : `<span class="blank"></span>`;
  return `<span style="${wrapStyle}">${esc(before)}${mid}${esc(after)}</span>`;
}

// ─── SCREENS ──────────────────────────────────────────────────────────────────
function homeHTML() {
  const available = CORPUS.filter(e => state.filter.includes(e.hsk)).length;

  const hskCols = [1,2,3].map(l => {
    const active = state.filter.includes(l);
    const pillStyle = active
      ? `background:var(--accent);border:1.5px solid var(--accent)`
      : `background:var(--bg);border:1.5px solid var(--border)`;
    return `<button data-action="toggleHsk" data-level="${l}"
      style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:0;background:none;border:none">
      <span style="font-size:15px;font-weight:600;color:${active ? 'var(--text-primary)' : 'var(--text-secondary)'}">HSK ${l}</span>
      <div style="width:100%;height:30px;border-radius:11px;${pillStyle}"></div>
    </button>`;
  }).join('');

  const lenCols = [20,40,'all'].map(o => {
    const active = state.sessionLength === o;
    const label = o === 'all' ? 'All' : o;
    const pillStyle = active
      ? `background:var(--accent2);border:1.5px solid var(--accent2)`
      : `background:var(--bg);border:1.5px solid var(--border)`;
    return `<button data-action="setLength" data-length="${o}"
      style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:0;background:none;border:none">
      <span style="font-size:15px;font-weight:600;color:${active ? 'var(--text-primary)' : 'var(--text-secondary)'}">${label}</span>
      <div style="width:100%;height:30px;border-radius:11px;${pillStyle}"></div>
    </button>`;
  }).join('');

  const cardStyle = `background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px`;

  return `
    <div style="display:flex;flex-direction:column;flex:1;padding-bottom:max(20px,env(safe-area-inset-bottom))">

      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;min-height:160px;padding:24px 0 36px">
        <div style="position:absolute;font-family:var(--font-chinese);font-weight:900;font-size:200px;line-height:1;color:rgba(165,30,23,0.07);pointer-events:none;user-select:none;transform:translateY(-10px)">造</div>
        <div style="font-family:var(--font-chinese);font-weight:900;font-size:88px;line-height:1;color:var(--text-primary);position:relative">造句</div>
        <div style="position:absolute;bottom:20px;font-size:11px;letter-spacing:4px;color:var(--text-secondary);text-transform:uppercase">Sentence Practice</div>
      </div>

      <div style="padding:0 20px">
        <div style="${cardStyle};margin-bottom:12px">
          <div style="font-size:11px;letter-spacing:2px;font-weight:600;color:var(--text-tertiary);margin-bottom:12px">HSK LEVEL</div>
          <div style="display:flex;gap:12px">${hskCols}</div>
        </div>

        <div style="${cardStyle};margin-bottom:12px">
          <div style="font-size:11px;letter-spacing:2px;font-weight:600;color:var(--text-tertiary);margin-bottom:12px">SESSION LENGTH</div>
          <div style="display:flex;gap:12px">${lenCols}</div>
        </div>

        <button class="btn-cta" data-action="start"${available === 0 ? ' disabled' : ''} style="border-radius:18px;font-size:20px;font-weight:700;padding:14px;margin-bottom:10px">开始 Start</button>

        <div style="display:flex;gap:12px">
          <button data-action="navStats" style="flex:1;${cardStyle};border-radius:14px;display:flex;align-items:center;justify-content:center;padding:13px 0">
            <div style="display:flex;align-items:flex-end;gap:3px;height:20px">
              <div style="width:5px;height:8px;border-radius:2px;background:var(--text-secondary)"></div>
              <div style="width:5px;height:13px;border-radius:2px;background:var(--text-secondary)"></div>
              <div style="width:5px;height:20px;border-radius:2px;background:var(--text-secondary)"></div>
            </div>
          </button>
          <button data-action="navSentences" style="flex:2;${cardStyle};border-radius:14px;display:flex;align-items:center;justify-content:space-between;padding:13px 16px">
            <span style="font-size:16px;color:var(--text-primary)">All sentences</span>
            <span style="font-size:18px;color:var(--text-secondary)">→</span>
          </button>
        </div>
      </div>
    </div>`;
}

function statsHTML() {
  const records = Object.entries(state.progress);
  const totalCorrect  = records.reduce((s, [,r]) => s + r.correct, 0);
  const totalAnswered = records.reduce((s, [,r]) => s + r.correct + r.missed, 0);
  const pct = totalAnswered > 0 ? Math.round(totalCorrect / totalAnswered * 100) : null;

  const byHsk = [1,2,3].map(level => {
    const ids = CORPUS.filter(e => e.hsk === level).map(e => e.id);
    const recs = ids.map(id => state.progress[id]).filter(Boolean);
    const c = recs.reduce((s,r) => s + r.correct, 0);
    const a = recs.reduce((s,r) => s + r.correct + r.missed, 0);
    return a > 0 ? { level, c, a, pct: Math.round(c/a*100) } : null;
  }).filter(Boolean);

  return `
    <div style="display:flex;flex-direction:column;flex:1;padding:max(20px,env(safe-area-inset-top)) 20px 48px">
      <button data-action="back" style="color:var(--text-secondary);font-size:16px;text-align:left;padding:8px 0;margin-bottom:8px">← Back</button>
      <h1 style="font-family:var(--font-heading);font-size:28px;font-weight:700;margin-bottom:32px">Stats</h1>

      ${pct === null ? `
        <div style="flex:1;display:flex;align-items:center;justify-content:center">
          <p style="color:var(--text-secondary);text-align:center;font-size:15px">No sessions yet.<br>Tap <em>开始 Start</em> to begin.</p>
        </div>` : `
        <div style="text-align:center;margin-bottom:32px">
          <div style="font-size:64px;font-weight:700;color:var(--accent2);line-height:1">${pct}%</div>
          <div style="color:var(--text-secondary);font-size:14px;margin-top:6px">${totalCorrect} correct of ${totalAnswered} attempts</div>
        </div>
        ${byHsk.length ? `<div class="card">
          ${byHsk.map((b,i) => `
            <div style="display:flex;justify-content:space-between;align-items:center;${i>0?'padding-top:12px;margin-top:12px;border-top:1px solid var(--border)':''}">
              <span style="color:var(--text-secondary);font-size:14px">HSK ${b.level}</span>
              <span style="color:var(--text-primary);font-size:14px;font-weight:500">${b.c}/${b.a} · ${b.pct}%</span>
            </div>`).join('')}
        </div>` : ''}
      `}
    </div>`;
}

function sentencesHTML() {
  const statusDot = (id) => {
    const r = state.progress[id];
    if (!r || (r.correct + r.missed) === 0) return `<div style="width:8px;height:8px;border-radius:50%;background:var(--border)"></div>`;
    if (r.streak >= 3) return `<div style="width:8px;height:8px;border-radius:50%;background:var(--accent)"></div>`;
    return `<div style="width:8px;height:8px;border-radius:50%;background:var(--accent2)"></div>`;
  };

  const rows = [1,2,3].map(level => {
    const entries = CORPUS.filter(e => e.hsk === level);
    return `
      <div style="font-size:11px;letter-spacing:2px;font-weight:600;color:var(--text-tertiary);margin:20px 0 8px;${level===1?'margin-top:0':''}">HSK ${level}</div>
      ${entries.map(e => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)">
          <div>
            <span style="font-family:var(--font-chinese);font-size:18px;color:var(--text-primary)">${esc(e.target)}</span>
            <span style="color:var(--text-secondary);font-size:14px"> · ${esc(e.english)}</span>
          </div>
          ${statusDot(e.id)}
        </div>`).join('')}`;
  }).join('');

  return `
    <div style="display:flex;flex-direction:column;flex:1;padding:max(20px,env(safe-area-inset-top)) 20px 48px;overflow-y:auto">
      <button data-action="back" style="color:var(--text-secondary);font-size:16px;text-align:left;padding:8px 0;margin-bottom:8px">← Back</button>
      <h1 style="font-family:var(--font-heading);font-size:28px;font-weight:700;margin-bottom:24px">All Sentences</h1>
      ${rows}
    </div>`;
}

function studyHTML() {
  const entry = currentEntry();
  if (!entry) return '';

  const pinyin = sentenceLine(
    entry.pinyin, entry.targetPinyinFull, state.revealed,
    'font-family:var(--font-body);font-size:18px;color:var(--text-primary)',
    'color:var(--accent);font-weight:600'
  );
  const hanzi = sentenceLine(
    entry.blanked, entry.target, state.revealed,
    `font-family:var(--font-chinese);font-size:26px;color:${state.revealed ? 'var(--text-primary)' : 'var(--text-secondary)'};transition:color 0.15s`,
    'color:var(--accent);font-weight:700'
  );

  const body = state.revealed ? `
    <div class="fade-in">
      <p style="color:var(--text-secondary);font-size:14px;line-height:1.5;margin-bottom:${entry.note ? 6 : 16}px">${esc(entry.english)}</p>
      ${entry.note ? `<p style="color:var(--accent2-text);font-size:13px;font-style:italic;line-height:1.5;margin-bottom:16px">${esc(entry.note)}</p>` : ''}
      <div class="divider"></div>
      <div style="margin-bottom:14px">
        ${state.matchResult
          ? `<span class="result-chip ok">✓ ${esc(normalise(state.checkedInput))}</span>`
          : `<span class="result-chip bad">✗ ${esc(state.checkedInput)} → ${esc(entry.targetPinyin)}</span>`}
      </div>
      <div class="grade-row">
        <button class="grade-btn g-correct${state.matchResult ? ' sel' : ''}" data-action="grade" data-grade="correct">✓ 对了</button>
        <button class="grade-btn g-wrong${!state.matchResult ? ' sel' : ''}" data-action="grade" data-grade="wrong">✗ 错了</button>
      </div>
    </div>` : `
    <div style="display:flex;gap:8px">
      <input class="input-field" type="text" placeholder="pinyin · e.g. gaoxing"
        autocapitalize="none" autocorrect="off" autocomplete="off" spellcheck="false" inputmode="text" />
      <button class="btn-outline" data-action="check" style="white-space:nowrap;flex-shrink:0">Check</button>
    </div>`;

  const words = entry.words || [];
  const activeWord = state.wordPopup !== null ? words[state.wordPopup] : null;
  const chipsHTML = words.length ? `
    <div class="divider"></div>
    <div class="word-row">
      ${words.map((w, i) => {
        const isTarget = w.h === entry.target;
        const isActive = state.wordPopup === i;
        const label = isTarget && !state.revealed ? '___' : esc(w.h);
        const cls = `word-chip${isTarget ? ' is-target' + (state.revealed ? ' revealed' : '') : ''}${isActive ? ' active' : ''}`;
        return `<button class="${cls}" data-action="wordTap" data-widx="${i}">${label}</button>`;
      }).join('')}
    </div>
    ${activeWord ? `<div class="word-def fade-in">
      <span style="font-family:var(--font-chinese);font-size:20px;color:var(--text-primary)">${esc(activeWord.h)}</span>
      <span style="color:var(--accent2);font-size:13px">${esc(activeWord.p)}</span>
      <span style="color:var(--text-secondary);font-size:13px">${esc(activeWord.e)}</span>
    </div>` : ''}` : '';

  return `
    <div style="display:flex;flex-direction:column;flex:1;padding:20px 0 48px">
      <div style="text-align:right;color:var(--text-tertiary);font-size:13px;font-weight:500;margin-bottom:20px">${state.idx + 1} / ${state.queue.length}</div>
      <div class="card">
        <div style="margin-bottom:10px;line-height:1.9">${pinyin}</div>
        <div style="margin-bottom:0;line-height:1.6">${hanzi}</div>
        ${chipsHTML}
        <div class="divider"></div>
        ${body}
      </div>
    </div>`;
}

function summaryHTML() {
  const correct = state.sessionResults.filter(r => r.correct).length;
  const total   = state.sessionResults.length;
  const pct     = total > 0 ? Math.round(correct / total * 100) : 0;
  const color   = pct >= 80 ? 'var(--accent)' : pct >= 55 ? 'var(--accent2)' : 'var(--text-primary)';

  const breakdown = [1,2,3].map(level => {
    const rows = state.sessionResults.filter(r => CORPUS.find(c => c.id === r.id)?.hsk === level);
    return rows.length ? { level, correct: rows.filter(r => r.correct).length, total: rows.length } : null;
  }).filter(Boolean);

  const bdHTML = breakdown.length > 1 ? `
    <div class="card" style="margin-bottom:32px">
      ${breakdown.map((b, i) => `
        <div style="display:flex;justify-content:space-between;align-items:center;${i > 0 ? 'padding-top:12px;margin-top:12px;border-top:1px solid var(--border)' : ''}">
          <span style="color:var(--text-secondary);font-size:14px">HSK ${b.level}</span>
          <span style="color:var(--text-primary);font-size:14px;font-weight:500">${b.correct}/${b.total}</span>
        </div>`).join('')}
    </div>` : '';

  return `
    <div style="display:flex;flex-direction:column;flex:1;justify-content:center;padding:40px 0">
      <div style="text-align:center;margin-bottom:40px">
        <div style="font-family:var(--font-heading);font-size:64px;font-weight:700;line-height:1;color:${color};margin-bottom:8px">${correct}/${total}</div>
        <div style="color:var(--text-secondary);font-size:20px">${pct}%</div>
      </div>
      ${bdHTML}
      <div style="display:flex;gap:10px">
        <button class="btn-outline" data-action="home" style="flex:1;padding:14px;font-size:15px">回家 Home</button>
        <button class="btn-cta" data-action="again" style="flex:1">再来一次 Again</button>
      </div>
    </div>`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
const root = document.getElementById('root');

function render() {
  if (state.screen === 'home')             root.innerHTML = homeHTML();
  else if (state.screen === 'study')       root.innerHTML = studyHTML();
  else if (state.screen === 'summary')     root.innerHTML = summaryHTML();
  else if (state.screen === 'stats')       root.innerHTML = statsHTML();
  else if (state.screen === 'sentences')   root.innerHTML = sentencesHTML();

  if (state.screen === 'study' && !state.revealed) {
    const inp = root.querySelector('.input-field');
    if (inp) { inp.value = state.input; inp.focus(); }
  }
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
root.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (el) dispatch(el.dataset.action, el.dataset);
  else if (state.wordPopup !== null) { state.wordPopup = null; render(); }
});

root.addEventListener('input', e => {
  if (e.target.classList.contains('input-field')) state.input = e.target.value;
});

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter' || state.screen !== 'study') return;
  if (!state.revealed && state.input.trim()) { e.preventDefault(); dispatch('check'); }
  else if (state.revealed) { e.preventDefault(); dispatch('grade', { grade: state.matchResult ? 'correct' : 'wrong' }); }
});

function dispatch(action, data = {}) {
  switch (action) {
    case 'toggleHsk': {
      const l = +data.level;
      if (state.filter.includes(l)) {
        if (state.filter.length > 1) state.filter = state.filter.filter(x => x !== l);
      } else {
        state.filter = [...state.filter, l].sort((a,b) => a-b);
      }
      saveFilter(state.filter);
      render();
      break;
    }
    case 'setLength': {
      state.sessionLength = data.length === 'all' ? 'all' : +data.length;
      saveSessionLength(state.sessionLength);
      render();
      break;
    }
    case 'start':
    case 'again': {
      state.queue = buildSession(state.filter, state.sessionLength, state.progress);
      state.idx = 0; state.input = ''; state.revealed = false; state.sessionResults = []; state.wordPopup = null;
      state.screen = 'study';
      render();
      break;
    }
    case 'check': {
      if (!state.input.trim()) return;
      state.checkedInput = state.input;
      state.matchResult = checkAnswer(state.input, currentEntry());
      state.revealed = true;
      render();
      break;
    }
    case 'grade': {
      const correct = data.grade === 'correct';
      const entry = currentEntry();
      const prev = state.progress[entry.id] || { correct:0, missed:0, lastSeen:0, streak:0 };
      state.progress[entry.id] = {
        correct: prev.correct + (correct ? 1 : 0),
        missed:  prev.missed  + (correct ? 0 : 1),
        lastSeen: Date.now(),
        streak: correct ? prev.streak + 1 : 0,
      };
      saveProgress(state.progress);
      state.sessionResults.push({ id: entry.id, correct });
      state.wordPopup = null;
      if (state.idx + 1 >= state.queue.length) {
        state.screen = 'summary';
      } else {
        state.idx++; state.input = ''; state.revealed = false;
      }
      render();
      break;
    }
    case 'wordTap': {
      const wi = +data.widx;
      state.wordPopup = state.wordPopup === wi ? null : wi;
      render();
      break;
    }
    case 'home': {
      state.screen = 'home';
      render();
      break;
    }
    case 'navStats': {
      state.screen = 'stats';
      render();
      break;
    }
    case 'navSentences': {
      state.screen = 'sentences';
      render();
      break;
    }
    case 'back': {
      state.screen = 'home';
      render();
      break;
    }
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
